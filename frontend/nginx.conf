server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Все API-запросы проксируем на бэкенд
    # "backend" — это имя сервиса из docker-compose.yml
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Таймауты на случай долгого ответа бэкенда
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Swagger UI тоже проксируем (удобно для разработки)
    location /swagger-ui/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /v3/api-docs/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # SPA fallback: все остальные маршруты → index.html
    # Нужно для React Router (если добавите роутинг)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кеширование статики (JS, CSS, картинки)
    location ~* .(js|css|png|jpg|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}